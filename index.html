<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Virtual - Biblioteca Pública de Cartago</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body>
    <header>
        <h1>Agenda de Actividades</h1>
        <p>Biblioteca Pública de Cartago</p>
    </header>

    <main>
        <div class="calendario-filtros">
            <p>Seleccione un día para ver los talleres:</p>
            <div class="botones-dias">
                <button class="btn-dia" onclick="filtrarPorDia('Lunes')">Lunes</button>
                <button class="btn-dia" onclick="filtrarPorDia('Martes')">Martes</button>
                <button class="btn-dia" onclick="filtrarPorDia('Miércoles')">Miércoles</button>
                <button class="btn-dia" onclick="filtrarPorDia('Jueves')">Jueves</button>
                <button class="btn-dia" onclick="filtrarPorDia('Viernes')">Viernes</button>
                <button class="btn-dia" onclick="filtrarPorDia('Sábado')">Sábado</button>
                <button class="btn-dia btn-todos" onclick="filtrarPorDia('todos')">Ver Todo</button>
            </div>
        </div>

        <div class="controles">
            <input type="text" id="buscador" placeholder="Buscar por actividad, instructor o lugar...">
            
            <select id="filtro-tipo">
                <option value="todos">Todos los eventos</option>
                <option value="recurrente">Cursos Recurrentes</option>
                <option value="espontaneo">Eventos Espontáneos</option>
            </select>
        </div>

        <div id="contenedor-actividades" class="grid-actividades">
            <p>Cargando la agenda de la biblioteca...</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
